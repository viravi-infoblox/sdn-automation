components:
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: Authorization
      description: 'Token-based auth. Value format: ''Token <token-value>'' obtained from POST /login/enterpriseLogin'
  schemas:
    PaginatedResponse:
      type: object
      description: Standard v2 paginated response wrapper.
      properties:
        data:
          type: array
          items:
            type: object
          description: Array of result objects.
        metaData:
          type: object
          properties:
            limit:
              type: integer
              description: Page size used.
            nextPageLink:
              type: string
              nullable: true
              description: Cursor token for next page (null if last page).
            prevPageLink:
              type: string
              nullable: true
              description: Cursor token for previous page.
            total:
              type: integer
              description: Total matching records.
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
