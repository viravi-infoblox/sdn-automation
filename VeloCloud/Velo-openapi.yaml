  description: 'OpenAPI 3.0 specification for VeloCloud SD-WAN Orchestrator v2 REST API (GET endpoints only).

    Generated from the VC-SD-WAN 6.4 Orchestrator OpenAPI Guide.


    All list endpoints return paginated responses wrapped in {data: [...], metaData: {nextPageLink, total}}.

    Use the ''include'' query parameter for graph traversal (e.g., include=site.* to resolve nested site attributes).'
  contact:
    name: VeloCloud API
    url: https://developer.vmware.com/apis/velocloud-sdwan/
servers:
- url: https://{orchestrator}
  description: VeloCloud Orchestrator
